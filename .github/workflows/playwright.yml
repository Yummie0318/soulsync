name: Playwright Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout code
        uses: actions/checkout@v5

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4️⃣ Install Playwright browsers
      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # 5️⃣ Build Next.js app
      - name: Build Next.js
        run: npm run build
        env:
          NODE_ENV: production
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      # 6️⃣ Start Next.js in background
      - name: Start Next.js
        run: |
          npm run start &
          echo $! > .next-server.pid
        env:
          NODE_ENV: production
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      # 7️⃣ Wait for app to be ready
      - name: Wait for app
        run: npx wait-on http://localhost:3000

      # 8️⃣ Run Playwright tests (consolidated report)
      - name: Run Playwright tests
        run: npx playwright test --workers=1 --fail-fast=false

      # 9️⃣ Upload HTML report as artifact
      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 30

      # 🔟 Deploy report to GitHub Pages
      - name: Deploy report to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report

      # 1️⃣1️⃣ Show report URL in logs
      - name: Show HTML report URL
        run: |
          echo "✅ Playwright HTML report is available at:"
          echo "https://${{ github.repository_owner }}.github.io/${{ github.repository }}/index.html"

      # 1️⃣2️⃣ Stop Next.js server
      - name: Stop Next.js server
        if: always()
        run: |
          if [ -f .next-server.pid ]; then
            kill $(cat .next-server.pid) || true
            rm .next-server.pid
          fi
