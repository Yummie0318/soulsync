        uses: actions/checkout@v4  # ✅ Added this line

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
