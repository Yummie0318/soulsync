name: Playwright Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout code
        uses: actions/checkout@v5

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4️⃣ Install Playwright browsers
      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # 5️⃣ Build and start Next.js app
      - name: Build and Start Next.js
        run: |
          npm run build
          npm run start &
        env:
          NODE_ENV: production

      # 6️⃣ Wait for app to be ready
      - name: Wait for app to be ready
        run: npx wait-on http://localhost:3000

      # 7️⃣ Run Playwright tests with HTML reporter + traces
      - name: Run Playwright tests
        run: npx playwright test --reporter=html --trace retain-on-failure

      # 8️⃣ Upload HTML report as artifact (for download)
      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 30

      # 9️⃣ Deploy HTML report to GitHub Pages
      - name: Deploy report to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report

      # 🔟 Print report URL in Actions logs for easy access
      - name: Show HTML report URL
        run: |
          echo "✅ Playwright HTML report (with traces) is available at:"
          echo "https://${{ github.repository_owner }}.github.io/${{ github.repository }}/index.html"
